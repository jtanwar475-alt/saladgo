<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="300" height="225">
  <defs>
    <linearGradient id="forkGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6b8e23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#558b2f;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Main container -->
  <g filter="url(#shadow)">
    <!-- Fork main structure -->
    <g id="fork">
      <!-- Handle -->
      <rect x="175" y="220" width="50" height="60" fill="url(#forkGradient)" rx="12"/>
      
      <!-- Base of fork -->
      <ellipse cx="200" cy="210" rx="35" ry="18" fill="#6b8e23"/>
      
      <!-- Left prong -->
      <path d="M 165 210 Q 160 150 165 80" stroke="#6b8e23" stroke-width="14" fill="none" stroke-linecap="round"/>
      
      <!-- Center prong (taller) -->
      <path d="M 200 210 Q 200 140 200 40" stroke="#6b8e23" stroke-width="14" fill="none" stroke-linecap="round"/>
      
      <!-- Right prong -->
      <path d="M 235 210 Q 240 150 235 80" stroke="#6b8e23" stroke-width="14" fill="none" stroke-linecap="round"/>
      
      <!-- Decorative leaves -->
      <!-- Left side leaves -->
      <g transform="translate(155, 140)">
        <ellipse cx="0" cy="0" rx="12" ry="18" fill="#7cb342" transform="rotate(-50)" opacity="0.9"/>
        <ellipse cx="0" cy="20" rx="10" ry="15" fill="#8bc34a" transform="rotate(-25)" opacity="0.8"/>
        <ellipse cx="0" cy="40" rx="11" ry="16" fill="#7cb342" transform="rotate(-45)" opacity="0.9"/>
      </g>
      
      <!-- Right side leaves -->
      <g transform="translate(245, 140)">
        <ellipse cx="0" cy="0" rx="12" ry="18" fill="#7cb342" transform="rotate(50)" opacity="0.9"/>
        <ellipse cx="0" cy="20" rx="10" ry="15" fill="#8bc34a" transform="rotate(25)" opacity="0.8"/>
        <ellipse cx="0" cy="40" rx="11" ry="16" fill="#7cb342" transform="rotate(45)" opacity="0.9"/>
      </g>
      
      <!-- Center top leaf accent -->
      <g transform="translate(200, 20)">
        <ellipse cx="0" cy="0" rx="10" ry="16" fill="#9ccc65" opacity="0.7"/>
      </g>
    </g>
  </g>
  
  <!-- Brand Text -->
  <text x="200" y="270" font-size="48" font-weight="700" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, sans-serif" letter-spacing="1">
    <tspan fill="#6b8e23" font-weight="800">SALAD</tspan><tspan fill="#ff9800" font-weight="800">GO</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="200" y="295" font-size="13" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, sans-serif" fill="#666" letter-spacing="0.5">
    Eat Fresh, Live Healthy
  </text>
</svg>